<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meme Vault</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Meme Vault">
          <span class="brand-mark">MV</span>
          <span>
            <strong>Meme Vault</strong>
            <small>Bộ sưu tập meme local</small>
          </span>
        </a>

        <div class="actions">
          <button class="icon-button" id="refreshButton" title="Quét lại thư mục ảnh" type="button">
            <span aria-hidden="true">↻</span>
          </button>
          <button class="icon-button" id="shuffleButton" title="Xáo trộn gallery" type="button">
            <span aria-hidden="true">⤨</span>
          </button>
          <button class="icon-button" id="focusButton" title="Chế độ trình chiếu" type="button">
            <span aria-hidden="true">◉</span>
          </button>
        </div>
      </header>

      <main>
        <section class="control-deck" aria-label="Bộ lọc meme">
          <div class="title-stack">
            <p class="eyebrow">Drop ảnh vào thư mục memes</p>
            <h1>Meme của bạn, nhìn như một phòng trưng bày 3D.</h1>
          </div>

          <div class="search-panel">
            <label class="search-box">
              <span aria-hidden="true">⌕</span>
              <input id="searchInput" type="search" placeholder="Tìm file/folder" autocomplete="off" />
            </label>

            <label class="select-box">
              <span>Folder</span>
              <select id="folderSelect"></select>
            </label>

            <label class="select-box">
              <span>Sắp xếp</span>
              <select id="sortSelect">
                <option value="newest">Mới nhất</option>
                <option value="oldest">Cũ nhất</option>
                <option value="name">Tên A-Z</option>
                <option value="size">File lớn</option>
              </select>
            </label>
          </div>

          <div class="stats-grid" aria-live="polite">
            <div>
              <small>Tổng ảnh</small>
              <strong id="totalCount">0</strong>
            </div>
            <div>
              <small>Đang hiện</small>
              <strong id="visibleCount">0</strong>
            </div>
            <div>
              <small>Folder</small>
              <strong id="folderCount">0</strong>
            </div>
          </div>
        </section>

        <section class="gallery-stage" aria-label="Danh sách meme">
          <div class="empty-state" id="emptyState">
            <div class="empty-cube" aria-hidden="true">
              <span></span><span></span><span></span>
            </div>
            <h2>Chưa có ảnh trong gallery</h2>
            <p>Thêm file ảnh vào thư mục <code>memes</code>, sau đó bấm nút quét lại.</p>
          </div>
          <div class="gallery-grid" id="galleryGrid"></div>
        </section>
      </main>
    </div>

    <dialog class="viewer" id="viewer">
      <div class="viewer-panel">
        <button class="viewer-close icon-button" id="closeViewer" title="Đóng" type="button">×</button>
        <button class="viewer-nav viewer-prev" id="prevButton" title="Ảnh trước" type="button">‹</button>
        <figure>
          <img id="viewerImage" alt="" />
          <figcaption>
            <span>
              <strong id="viewerTitle"></strong>
              <small id="viewerMeta"></small>
            </span>
            <a class="download-button" id="downloadButton" download>↓ Tải</a>
          </figcaption>
        </figure>
        <button class="viewer-nav viewer-next" id="nextButton" title="Ảnh sau" type="button">›</button>
      </div>
    </dialog>

    <template id="cardTemplate">
      <article class="meme-card">
        <button class="card-button" type="button">
          <span class="image-wrap">
            <img loading="lazy" alt="" />
          </span>
          <span class="card-meta">
            <strong></strong>
            <small></small>
          </span>
        </button>
      </article>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
</html>
